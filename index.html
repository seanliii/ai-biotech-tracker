<style>

.search-box::before { content:"&#x1F50D;"; position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:0.9rem; }

.bio-card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:20px; transition:all 0.3s; cursor:pointer; position:relative; overflow:hidden; display:flex; flex-direction:column; }

.bio-card:hover::before { opacity:1; }

.table-view { display:none; }

.modal-section { margin-bottom:16px; }

.modal-tags { display:flex; gap:6px; flex-wrap:wrap; margin:12px 0; }
.modal-tag { padding:4px 12px; border-radius:12px; font-size:0.75rem; background:rgba(96,165,250,0.15); color:#60a5fa; }
.modal-links { margin-top:16px; }
.modal-link { display:block; color:#60a5fa; font-size:0.85rem; text-decoration:none; margin-bottom:6px; }
.modal-link:hover { text-decoration:underline; }
.modal-meta { display:flex; gap:16px; margin-top:16px; padding-top:16px; border-top:1px solid rgba(255,255,255,0.05); font-size:0.85rem; color:#64748b; }

.timeline-view { display:none; }
.timeline-view.active { display:block; }
.timeline { position:relative; padding-left:24px; }
.timeline::before { content:''; position:absolute; left:8px; top:0; bottom:0; width:2px; background:linear-gradient(180deg,#60a5fa,#a78bfa); }
.timeline-item { position:relative; padding:16px 0 16px 24px; cursor:pointer; transition:all 0.2s; }
.timeline-item:hover { background:rgba(255,255,255,0.03); border-radius:8px; }
.timeline-dot { position:absolute; left:-20px; top:22px; width:12px; height:12px; border-radius:50%; background:#60a5fa; border:2px solid #1e293b; }
.timeline-dot.type-clinical { background:#22c55e; }

.timeline-date { font-size:0.8rem; color:#64748b; margin-bottom:4px; }

.timeline-company { font-size:0.8rem; color:#94a3b8; margin-top:2px; }
.timeline-amount { font-size:0.9rem; color:#60a5fa; font-weight:600; margin-top:4px; }

.footer { text-align:center; padding:24px 0; color:#64748b; font-size:0.8rem; border-top:1px solid rgba(255,255,255,0.05); margin-top:24px; }
</style>
</head>

{id:10,name:"GenBio AI Virtual Cell World Model",company:"GenBio AI (Song Le)",type:"tech",status:"Tech Validation",amount:"N/A",date:"2026-06",phase:"Proof of Concept",desc:"Former BioMap CTO Song Le founded GenBio AI to build virtual cell world models, simulating cell/tissue/organ responses to drugs using AI. Goal: digital twin from target simulation to clinical individual.",tags:["Virtual Cell","World Model","Digital Twin","Wet Lab Replacement","AI for Science"],keyInfo:"Virtual cell world model; Simulates cell -> tissue -> organ -> individual; Converts wet lab experiments to computational simulation; Showcased at Summer Davos 2026; Compared to AlphaFold 1 pre-moment stage",links:[{name:"ZAKER Coverage",url:"http://www.myzaker.com/article/6a3fb77e8e9f091354244baf"}]},
{id:11,name:"IsoDDE Protein-Ligand Prediction",company:"Google DeepMind",type:"tech",status:"Breakthrough",amount:"N/A",date:"2026-06",phase:"Published",desc:"Google DeepMind launched IsoDDE model, doubling protein-ligand binding prediction success rate and precisely mining 'hidden binding pockets' in target proteins, making previously 'undruggable' tumor targets druggable.",tags:["Protein-Ligand","Hidden Binding Pockets","Druggable","Tumor Targets","IsoDDE"],keyInfo:"Doubled protein-ligand binding prediction success; Precisely mines 'hidden binding pockets'; Makes 'undruggable' targets druggable; Significant breakthrough in tumor domain; Published June 2026",links:[{name:"Breakthrough Coverage",url:"http://k.sina.com.cn/article_7879848900_1d5acf3c406802yzno.html"}]},
{id:12,name:"Shanghai Computational Biology Innovation Competition",company:"Shanghai Science & Tech Commission",type:"regulatory",status:"Competition Launch",amount:"N/A",date:"2026-06-25",phase:"Full Launch",desc:"2026 Shanghai International Computational Biology Innovation Competition fully launched on June 25, targeting global cross-disciplinary talent. Aligns with Shanghai's computational biology innovation layout, now in its 3rd edition.",tags:["Computational Biology","Innovation Competition","Cross-Disciplinary","Talent","Shanghai Layout"],keyInfo:"Fully launched June 25, 2026; Targets global cross-disciplinary talent; 3rd edition competition; Aligns with Shanghai computational biology layout; AI pharma talent cultivation ecosystem",links:[{name:"Competition Coverage",url:"https://finance.sina.com.cn/wm/2026-06-27/doc-inievrew7230590.shtml"}]}
];

const typeLabels={all:'All',clinical:'Clinical Pipeline',capital:'Capital',tech:'Tech Breakthrough',regulatory:'Regulatory',talent:'Talent'};
const typeClasses={clinical:'type-clinical',capital:'type-capital',tech:'type-tech',regulatory:'type-regulatory',talent:'type-talent'};
const statusColors={clinical:'#22c55e',capital:'#a855f7',tech:'#f97316',talent:'#ec4899',regulatory:'#60a5fa'};
let currentView='cards',currentFilter='all',searchQuery='';

function renderStats(){
  const total=bioData.length;
  const totalAmount=bioData.reduce((s,d)=>{const a=parseAmount(d.amount);return s+(a||0)},0);
  const clinicalCount=bioData.filter(d=>d.type==='clinical').length;
  const capitalCount=bioData.filter(d=>d.type==='capital').length;
  const maxAmount=bioData.reduce((m,d)=>{const a=parseAmount(d.amount);return a>m?a:m},0);
  const stats=[
    {value:total,label:'Events Tracked'},
    {value:totalAmount>=1000?(totalAmount/1000).toFixed(1)+'B':totalAmount+'M',label:'Total Value'},
    {value:clinicalCount,label:'Clinical Pipeline'},
    {value:capitalCount,label:'Capital Deals'},
    {value:maxAmount>=1000?(maxAmount/1000).toFixed(1)+'B':maxAmount+'M',label:'Largest Deal'}
  ];
  document.getElementById('statsBar').innerHTML=stats.map(s=>`<div class="stat-card"><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div>`).join('');
}

function parseAmount(amt){
  if(!amt||amt==='N/A')return 0;
  const num=parseFloat(amt.replace(/[^0-9.]/g,''));
  if(amt.includes('B'))return num*1000;
  if(amt.includes('M'))return num;
  return num;
}

function getFilteredData(){
  let data=bioData;
  if(currentFilter!=='all')data=data.filter(d=>d.type===currentFilter);
  if(searchQuery)data=data.filter(d=>[d.name,d.company,d.desc,d.tags.join(' ')].join(' ').toLowerCase().includes(searchQuery.toLowerCase()));
  return data;
}

function renderFilters(){
  const group=document.getElementById('filterGroup');
  group.innerHTML=Object.entries(typeLabels).map(([k,v])=>`<button class="filter-btn ${k===currentFilter?'active':''}" data-filter="${k}">${v}</button>`).join('');
  group.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      currentFilter=btn.dataset.filter;
      searchQuery='';
      document.getElementById('searchInput').value='';
      renderFilters();renderView();
    });
  });
}

function renderViewToggle(){
  const views=[{k:'cards',l:'Cards'},{k:'timeline',l:'Timeline'},{k:'table',l:'Table'}];
  document.getElementById('viewToggle').innerHTML=views.map(v=>`<button class="view-btn ${v.k===currentView?'active':''}" data-view="${v.k}">${v.l}</button>`).join('');
  document.getElementById('viewToggle').querySelectorAll('.view-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{currentView=btn.dataset.view;renderView();});
  });
}

function renderCards(data){
  const grid=document.getElementById('cardsGrid');
  grid.style.display='grid';
  document.getElementById('tableView').classList.remove('active');
  document.getElementById('timelineView').classList.remove('active');
  if(!data.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;color:#64748b;padding:40px;">No matching results</div>';return;}
  grid.innerHTML=data.map(d=>{
    return `<div class="bio-card" data-id="${d.id}">
      <div class="card-header">
        <div>
          <div class="card-name">${d.name}</div>
          <div class="card-company">${d.company}</div>
        </div>
        <span class="card-type ${typeClasses[d.type]}">${typeLabels[d.type]}</span>
      </div>
      <div class="card-status" style="color:${statusColors[d.type]}">${d.status}</div>
      ${d.amount!=='N/A'?`<div class="card-amount">${d.amount}</div>`:''}
      <div class="card-desc">${d.desc}</div>
      <div class="card-footer">
        <span>${d.date}</span>
        <span>Tap for details</span>
      </div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.bio-card').forEach(c=>c.addEventListener('click',()=>openModal(parseInt(c.dataset.id))));
}

function renderTable(data){
  document.getElementById('cardsGrid').style.display='none';
  document.getElementById('timelineView').classList.remove('active');
  const tv=document.getElementById('tableView');
  tv.classList.add('active');
  if(!data.length){tv.innerHTML='<div style="text-align:center;color:#64748b;padding:40px;">No matching results</div>';return;}
  tv.innerHTML=`<table class="bio-table">
    <tr><th>Drug/Event</th><th>Company</th><th>Type</th><th>Status</th><th>Amount</th><th>Date</th></tr>
    ${data.map(d=>`<tr data-id="${d.id}">
      <td><div class="td-name">${d.name}</div></td>
      <td><div class="td-company">${d.company}</div></td>
      <td><span class="td-type ${typeClasses[d.type]}">${typeLabels[d.type]}</span></td>
      <td>${d.status}</td>
      <td class="td-amount">${d.amount}</td>
      <td>${d.date}</td>
    </tr>`).join('')}
  </table>`;
  tv.querySelectorAll('tr[data-id]').forEach(r=>r.addEventListener('click',()=>openModal(parseInt(r.dataset.id))));
}

function renderTimeline(data){
  document.getElementById('cardsGrid').style.display='none';
  document.getElementById('tableView').classList.remove('active');
  const tl=document.getElementById('timelineView');
  tl.classList.add('active');
  if(!data.length){tl.innerHTML='<div style="text-align:center;color:#64748b;padding:40px;">No matching results</div>';return;}
  const sorted=[...data].sort((a,b)=>{const da=new Date(a.date.replace(/-/g,'/')),db=new Date(b.date.replace(/-/g,'/'));return db-da;});
  tl.innerHTML=`<div class="timeline">${sorted.map(d=>`
    <div class="timeline-item" data-id="${d.id}">
      <div class="timeline-dot ${typeClasses[d.type]}"></div>
      <div class="timeline-date">${d.date}</div>
      <div class="timeline-title">${d.name}</div>
      <div class="timeline-company">${d.company}</div>
      ${d.amount!=='N/A'?`<div class="timeline-amount">${d.amount}</div>`:''}
    </div>
  `).join('')}</div>`;
  tl.querySelectorAll('.timeline-item').forEach(i=>i.addEventListener('click',()=>openModal(parseInt(i.dataset.id))));
}

function renderView(){
  const data=getFilteredData();
  if(currentView==='cards')renderCards(data);
  else if(currentView==='table')renderTable(data);
  else renderTimeline(data);
}

function openModal(id){
  const d=bioData.find(x=>x.id===id);
  if(!d)return;
  const modal=document.getElementById('modal');
  modal.innerHTML=`<div class="modal-header">
    <button class="modal-close">&times;</button>
    <div class="modal-title">${d.name}</div>
    <div class="modal-subtitle">${d.company}</div>
  </div>
  <div class="modal-body">
    ${d.amount!=='N/A'?`<div class="modal-amount">${d.amount}</div>`:''}
    <div class="modal-tags">${d.tags.map(t=>`<span class="modal-tag">${t}</span>`).join('')}</div>
    <div class="modal-section">
      <div class="modal-section-title">Overview</div>
      <div class="modal-section-content">${d.desc}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Key Info</div>
      <div class="modal-section-content">${d.keyInfo.replace(/\n/g,'<br>')}</div>
    </div>
    <div class="modal-links">${d.links.map(l=>`<a class="modal-link" href="${l.url}" target="_blank">&#x1F517; ${l.name}</a>`).join('')}</div>
    <div class="modal-meta">
      <span>&#x1F4C5; ${d.date}</span>
      <span>&#x1F3F7; ${typeLabels[d.type]}</span>
      <span>&#x1F4CC; ${d.status}</span>
    </div>
  </div>`;
  document.getElementById('modalOverlay').classList.add('active');
  modal.querySelector('.modal-close').addEventListener('click',closeModal);
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('active');}

document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))closeModal();});
document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value;renderView();});

renderStats();renderFilters();renderViewToggle();renderView();
</script>
</body>
</html>
