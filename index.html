            `).join('');

        // Get filtered data
        function getFilteredData() {
            return biotechData.filter(item => {
                const matchSearch = !searchQuery || 
                    item.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    item.company.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    item.description.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    item.aiTech.toLowerCase().includes(searchQuery.toLowerCase());
                const matchPhase = activePhase === 'all' || item.phase === activePhase;
                const matchTherapeutic = activeTherapeutic === 'all' || item.therapeuticArea === activeTherapeutic;
                return matchSearch && matchPhase && matchTherapeutic;
            });
        }

            render();
        });

        document.getElementById('phaseFilters').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                activePhase = e.target.dataset.phase;
                renderFilters();
                render();
            }
        });

        document.getElementById('therapeuticFilters').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                activeTherapeutic = e.target.dataset.therapeutic;
                renderFilters();
                render();
            }
        });

        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentView = btn.dataset.view;
                render();
            });
        });

        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Initialize
        renderFilters();
        render();
    </script>
</body>
</html>
