                    <div class="modal-section-title">🔑 关键信息</div>
                    <div class="modal-section-content">
                        <ul style="margin-left:18px;line-height:1.8;">
                            ${item.details.keyInfo.map(info => `<li>${info}</li>`).join('')}
                        </ul>
                    </div>
                </div>
                <div class="modal-section">
                    <div class="modal-section-title">🤖 AI技术细节</div>
                    <div class="modal-section-content">${item.details.aiTechDetails}</div>
                </div>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-item-label">临床阶段</div>
                        <div class="info-item-value">${item.phase}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-item-label">治疗领域</div>
                        <div class="info-item-value">${item.therapeuticArea}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-item-label">AI技术</div>
                        <div class="info-item-value">${item.aiTech}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-item-label">关键日期</div>
                        <div class="info-item-value">${item.keyDate}</div>
                    </div>
                </div>
                <div class="modal-section" style="margin-top:20px;">
                    <div class="modal-section-title">🔗 信息来源</div>
                    <div class="modal-section-content">
                        ${item.details.sources.map(s => `<a href="${s.url}" target="_blank" class="source-link">${s.name} ↗</a>`).join('<br>')}
                    </div>
                </div>
            `;
            document.getElementById('modalOverlay').classList.add('active');
        };

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            render();
        });

        document.getElementById('phaseFilters').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                activePhase = e.target.dataset.phase;
                renderFilters();
                render();
            }
        });

        document.getElementById('therapeuticFilters').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                activeTherapeutic = e.target.dataset.therapeutic;
                renderFilters();
                render();
            }
        });

        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentView = btn.dataset.view;
                render();
            });
        });

        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Initialize
        renderFilters();
        render();
    </script>
</body>
</html>
